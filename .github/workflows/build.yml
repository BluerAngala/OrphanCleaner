name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 构建 Release
        run: swift build -c release

      - name: 创建 .app 包
        run: |
          APP_NAME="残留清理助手"
          OUTPUT_DIR="Build"
          APP_PATH="$OUTPUT_DIR/$APP_NAME.app"
          BUILD_DIR=".build"

          mkdir -p "$APP_PATH/Contents/MacOS"
          mkdir -p "$APP_PATH/Contents/Resources"

          # 查找编译产物（swift build -c release 输出到 .build/arm64-apple-macosx/release/）
          BINARY=".build/arm64-apple-macosx/release/OrphanCleaner"
          if [ ! -f "$BINARY" ]; then
            BINARY=".build/release/OrphanCleaner"
          fi
          if [ ! -f "$BINARY" ]; then
            echo "❌ 找不到编译产物！"
            find "$BUILD_DIR" -name "*OrphanCleaner*" -type f
            exit 1
          fi
          echo "📦 二进制: $BINARY"

          cp "$BINARY" "$APP_PATH/Contents/MacOS/OrphanCleaner"
          cp Sources/OrphanCleaner/Resources/Info.plist "$APP_PATH/Contents/"
          echo "APPL????" > "$APP_PATH/Contents/PkgInfo"

          if [ -d "Sources/OrphanCleaner/Resources" ]; then
            cp -r Sources/OrphanCleaner/Resources/* "$APP_PATH/Contents/Resources/" 2>/dev/null || true
          fi

          echo "✅ .app 创建完成: $APP_PATH"

      - name: 签名 & 公证（如有证书）
        if: env.HAS_CERT == 'true'
        env:
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          DEVELOPER_ID_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          HAS_CERT: ${{ secrets.DEVELOPER_ID_P12 != '' }}
        run: |
          APP_NAME="残留清理助手"
          APP_PATH="Build/$APP_NAME.app"

          # 从 p12 提取证书和私钥（绕过 keychain）
          echo "$DEVELOPER_ID_P12" | base64 -d > cert.p12
          openssl pkcs12 -in cert.p12 -nocerts -nodes -passin pass:"$DEVELOPER_ID_PASSWORD" -out key.pem 2>/dev/null
          openssl pkcs12 -in cert.p12 -clcerts -nokeys -passin pass:"$DEVELOPER_ID_PASSWORD" -out cert.pem 2>/dev/null

          # 合并为 identity（证书+私钥）
          cat key.pem cert.pem > identity.pem

          # 导入 keychain（用 security import identity 方式）
          security create-keychain -p temp build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp build.keychain
          security import cert.p12 -k build.keychain -P "$DEVELOPER_ID_PASSWORD" -T /usr/bin/codesign -A 2>/dev/null || {
            # 如果 p12 导入失败，尝试用 openssl 提取的 pem
            security import identity.pem -k build.keychain -P "" -T /usr/bin/codesign -A
          }
          security set-key-partition-list -S apple-tool:,apple: -s -k temp build.keychain 2>/dev/null || true

          # 签名
          echo "✍️  Developer ID 签名..."
          DEVELOPER_ID=$(security find-identity -v -p basic | grep "Developer ID Application" | head -1 | grep -oE '[A-F0-9]{40}')
          if [ -z "$DEVELOPER_ID" ]; then
            echo "❌ 找不到签名身份"
            security find-identity -v -p basic
            exit 1
          fi
          codesign --force --deep --options runtime \
            --sign "$DEVELOPER_ID" \
            "$APP_PATH"

          # 公证（Apple ID + 专用密码模式，无需 App Store Connect）
          echo "📋 提交公证（需等待 1-3 分钟）..."
          ditto -c -k --keepParent "$APP_PATH" app.zip
          xcrun notarytool submit app.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --wait

          # 装订公证票据
          echo "📎 装订公证票据..."
          xcrun stapler staple "$APP_PATH"
          echo "✅ 签名公证完成"

      - name: Ad-hoc 签名（无证书时）
        if: env.HAS_CERT != 'true'
        run: |
          APP_PATH="Build/残留清理助手.app"
          codesign --force --deep --sign - "$APP_PATH" 2>/dev/null || true
          echo "⚠️ Ad-hoc 签名（用户需右键打开）"

      - name: 创建 DMG
        run: |
          APP_NAME="残留清理助手"
          DMG_NAME="${APP_NAME}.dmg"
          WORK_DIR="dmg_staging"

          mkdir -p "$WORK_DIR"
          cp -r "Build/$APP_NAME.app" "$WORK_DIR/"
          ln -s /Applications "$WORK_DIR/Applications"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$WORK_DIR" \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "✅ DMG 创建完成: $DMG_NAME"
          echo "DMG_FILE=$DMG_NAME" >> $GITHUB_ENV

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 残留清理助手
          path: "*.dmg"
          retention-days: 30

      - name: 创建 Release（仅 tag 推送）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.dmg"
          body: |
            ## 残留清理助手

            macOS 原生 App，检测并清理已卸载软件留下的所有残留。

            ### 使用方法

            1. 下载 DMG，双击打开
            2. 将「残留清理助手」拖入 `Applications`
            3. 首次打开：**右键点击 → 打开**（或直接双击，已签名公证则无警告）

            ### 扫描范围

            - 📁 文件残留：~/Library 下 6 个目录
            - 🚀 启动项残留：LaunchAgents/LaunchDaemons plist
            - 🔐 登录项残留：BTM 数据库幽灵条目
            - 🧩 扩展残留：Finder 同步扩展注册残余
            - 💾 服务缓存：launchctl disabled.plist 残留

            ### 安全

            五层过滤 + 路径安全网 + 二次确认 + 废纸篓（可恢复）
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
