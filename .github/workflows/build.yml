name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: 构建 Release
        run: swift build -c release

      - name: 创建 .app 包
        run: |
          APP_NAME="残留清理助手"
          OUTPUT_DIR="Build"
          APP_PATH="$OUTPUT_DIR/$APP_NAME.app"
          BUILD_DIR=".build"

          mkdir -p "$APP_PATH/Contents/MacOS"
          mkdir -p "$APP_PATH/Contents/Resources"

          # 查找编译产物（swift build -c release 输出到 .build/arm64-apple-macosx/release/）
          BINARY=".build/arm64-apple-macosx/release/OrphanCleaner"
          if [ ! -f "$BINARY" ]; then
            BINARY=".build/release/OrphanCleaner"
          fi
          if [ ! -f "$BINARY" ]; then
            echo "❌ 找不到编译产物！"
            find "$BUILD_DIR" -name "*OrphanCleaner*" -type f
            exit 1
          fi
          echo "📦 二进制: $BINARY"

          cp "$BINARY" "$APP_PATH/Contents/MacOS/OrphanCleaner"
          cp Sources/OrphanCleaner/Resources/Info.plist "$APP_PATH/Contents/"
          echo "APPL????" > "$APP_PATH/Contents/PkgInfo"

          if [ -d "Sources/OrphanCleaner/Resources" ]; then
            cp -r Sources/OrphanCleaner/Resources/* "$APP_PATH/Contents/Resources/" 2>/dev/null || true
          fi

          echo "✅ .app 创建完成: $APP_PATH"

      - name: 签名 & 公证（如有证书）
        if: env.HAS_CERT == 'true'
        env:
          DEV_CERT: ${{ secrets.DEV_CERT }}
          DEV_KEY: ${{ secrets.DEV_KEY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
          HAS_CERT: ${{ secrets.DEV_CERT != '' }}
        run: |
          APP_PATH="Build/残留清理助手.app"
          
          echo "$DEV_CERT" | base64 -d > cert.pem
          echo "$DEV_KEY" | base64 -d > key.pem
          
          # 导入证书
          cat key.pem cert.pem > identity.pem
          security create-keychain -p temp build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp build.keychain
          security import identity.pem -k build.keychain -T /usr/bin/codesign -A
          security set-key-partition-list -S apple-tool:,apple: -s -k temp build.keychain
          
          DEVELOPER_ID=$(security find-identity -v -p basic | grep "Developer ID Application" | head -1 | grep -oE '[A-F0-9]{40}')
          if [ -z "$DEVELOPER_ID" ]; then
            echo "⚠️ 签名跳过"
            exit 0
          fi
          
          echo "✍️  签名中..."
          codesign --force --deep --options runtime --sign "$DEVELOPER_ID" "$APP_PATH"
          echo "✅ 已签名"
          
          echo "📋 提交公证（等待 Apple 审核，约 1-3 分钟）..."
          ditto -c -k --keepParent "$APP_PATH" app.zip
          xcrun notarytool submit app.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --wait --timeout 15m
          
          echo "📎 装订公证票据..."
          xcrun stapler staple "$APP_PATH"
          echo "✅ 签名公证完成，双击打开无警告"

      - name: Ad-hoc 签名（无证书时）
        if: env.HAS_CERT != 'true'
        run: |
          APP_PATH="Build/残留清理助手.app"
          codesign --force --deep --sign - "$APP_PATH" 2>/dev/null || true
          echo "⚠️ Ad-hoc 签名（用户需右键打开）"

      - name: 创建 DMG
        run: |
          APP_NAME="残留清理助手"
          DMG_NAME="${APP_NAME}.dmg"
          WORK_DIR="dmg_staging"

          mkdir -p "$WORK_DIR"
          cp -r "Build/$APP_NAME.app" "$WORK_DIR/"
          ln -s /Applications "$WORK_DIR/Applications"

          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$WORK_DIR" \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "✅ DMG 创建完成: $DMG_NAME"
          echo "DMG_FILE=$DMG_NAME" >> $GITHUB_ENV

      - name: 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: 残留清理助手
          path: "*.dmg"
          retention-days: 30

      - name: 创建 Release（仅 tag 推送）
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "*.dmg"
          body: |
            ## 残留清理助手

            macOS 原生 App，检测并清理已卸载软件留下的所有残留。

            ### 使用方法

            1. 下载 DMG，双击打开
            2. 将「残留清理助手」拖入 `Applications`
            3. **双击打开即可使用**（已签名公证，无安全警告）

            ### 扫描范围

            - 📁 文件残留：~/Library 下 6 个目录
            - 🚀 启动项残留：LaunchAgents/LaunchDaemons plist
            - 🔐 登录项残留：BTM 数据库幽灵条目
            - 🧩 扩展残留：Finder 同步扩展注册残余
            - 💾 服务缓存：launchctl disabled.plist 残留

            ### 安全

            五层过滤 + 路径安全网 + 二次确认 + 废纸篓（可恢复）
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
