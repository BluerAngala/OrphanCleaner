name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 25
    env:
      APP_NAME: "仿win自动清理工具"

    steps:
      - uses: actions/checkout@v4

      - name: 编译
        run: swift build -c release

      - name: 创建 .app 包
        run: |
          APP_PATH="Build/$APP_NAME.app"
          mkdir -p "$APP_PATH/Contents/MacOS" "$APP_PATH/Contents/Resources"

          BINARY=".build/arm64-apple-macosx/release/OrphanCleaner"
          [ ! -f "$BINARY" ] && BINARY=".build/release/OrphanCleaner"
          [ ! -f "$BINARY" ] && { echo "❌ 找不到编译产物"; exit 1; }

          cp "$BINARY" "$APP_PATH/Contents/MacOS/OrphanCleaner"
          cp Sources/OrphanCleaner/Resources/Info.plist "$APP_PATH/Contents/"
          echo "APPL????" > "$APP_PATH/Contents/PkgInfo"

          if [ -d "Sources/OrphanCleaner/Resources" ]; then
            cp -r Sources/OrphanCleaner/Resources/* "$APP_PATH/Contents/Resources/" 2>/dev/null || true
          fi

      - name: Developer ID 签名
        if: env.CERT_P12 != ''
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_PASSWORD }}
        run: |
          APP_PATH="Build/$APP_NAME.app"
          echo "$CERT_P12" | base64 -d > /tmp/cert.p12

          security create-keychain -p temp build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p temp build.keychain
          security import /tmp/cert.p12 -k build.keychain -P "$CERT_PASSWORD" -T /usr/bin/codesign -A
          security set-key-partition-list -S apple-tool:,apple: -s -k temp build.keychain
          rm -f /tmp/cert.p12

          HASH=$(security find-identity -v -p basic | grep "Developer ID Application" | head -1 | grep -oE '[A-F0-9]{40}')
          if [ -z "$HASH" ]; then echo "❌ 证书导入失败"; exit 1; fi

          codesign --force --deep --options runtime --sign "$HASH" "$APP_PATH"
          security default-keychain -s login.keychain
          echo "✅ 签名完成"

      - name: 验证签名
        if: env.CERT_P12 != ''
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_P12 }}
        run: |
          codesign -dvvv "Build/$APP_NAME.app" 2>&1 | grep -E "Authority|TeamIdentifier"
          echo "✅ 签名验证通过"

      - name: 公证
        if: env.CERT_P12 != ''
        env:
          CERT_P12: ${{ secrets.DEVELOPER_ID_P12 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
        run: |
          APP_PATH="Build/$APP_NAME.app"
          ditto -c -k --keepParent "$APP_PATH" /tmp/app.zip

          echo "📋 提交公证，等待 Apple 验证..."
          xcrun notarytool submit /tmp/app.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$NOTARIZATION_PASSWORD" \
            --wait --timeout 20m \
            --output-format json > /tmp/nr.json

          STATUS=$(python3 -c "import json;print(json.load(open('/tmp/nr.json')).get('status','unknown'))" 2>/dev/null)
          echo "📋 公证状态: $STATUS"

          if [ "$STATUS" != "Accepted" ]; then
            cat /tmp/nr.json
            exit 1
          fi

          xcrun stapler staple "$APP_PATH"
          echo "✅ 公证完成，票据已装订"

      - name: 创建 DMG
        run: |
          DMG_NAME="OrphanCleaner.dmg"
          mkdir -p dmg_staging
          cp -r "Build/$APP_NAME.app" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create -volname "$APP_NAME" -srcfolder dmg_staging -ov -format UDZO "$DMG_NAME" 2>/dev/null
          rm -rf dmg_staging
          echo "DMG_FILE=$DMG_NAME" >> $GITHUB_ENV

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: OrphanCleaner
          path: "OrphanCleaner.dmg"
          retention-days: 30

      - name: 创建 Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: "OrphanCleaner.dmg"
          body: "## 仿win自动清理工具 ${{ github.ref_name }}

macOS 原生 App，已签名公证，双击即可使用。

### 使用方法
1. 下载 DMG，双击打开
2. 将「仿win自动清理工具」拖入 Applications
3. 双击打开，无安全警告

### 扫描范围
- 文件残留：~/Library 下 6 个目录
- 启动项残留：LaunchAgents/LaunchDaemons
- 登录项残留：BTM 数据库幽灵条目
- 扩展残留：Finder 同步扩展注册残余
- 服务缓存：launchctl disabled.plist 残留

### 安全
五层过滤 + 路径安全网 + 二次确认 + 废纸篓（可恢复）

### 签名
✅ Developer ID 签名（Heng Chen）
✅ Apple 公证验证通过"        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
